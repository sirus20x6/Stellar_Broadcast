  # ═══════════════════════════════════════════════════════════════════════════
  # NEW STATECHART EVENTS (guards, weighted outcomes, chains)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: emergency_repair_drone
    title: "Emergency Repair Drone"
    narrative: >
      A dormant repair drone activates nearby, drawn by your ship's
      distress signals. Its ancient programming offers three modes.
    category: boon
    tags: [boon, repair, guarded]
    guard: "hull < 0.5 and encounter >= 3"
    choices:
      - text: "Hull priority"
        outcome: "The drone welds the worst breaches with alien alloy."
        ship: { hull: 0.20, shields: -0.05 }
      - text: "Systems sweep"
        outcome: "The drone distributes repairs across all systems."
        ship: { hull: 0.08, nav: 0.05, tech: 0.05, cryopods: 0.05 }
      - text: "Salvage the drone"
        outcome: "You strip the drone for parts and fuel."
        ship: { tech: 0.10 }
        fuel: 15

  - id: rogue_comet
    title: "Rogue Comet"
    narrative: >
      A comet on an intercept course carries both danger and opportunity.
      Its ice core could replenish water supplies, but harvesting requires
      precise maneuvering.
    category: common
    tags: [hazard, opportunity]
    choices:
      - text: "Harvest the ice"
        guard: "fuel >= 20 and nav > 0.4"
        outcome: "Careful thruster work brings ice aboard safely."
        ship: { nav: -0.05 }
        fuel: -10
        planet: { water: 0.10 }
      - text: "Analyze from distance"
        outcome: "Passive scans reveal the comet's composition."
        ship: { tech: 0.03 }
        probeCost: 1
      - text: "Evade"
        outcome: "You steer clear. The comet passes harmlessly."
        ship: { nav: -0.03 }
        fuel: -5

  - id: alien_distress_signal
    title: "Alien Distress Signal"
    narrative: >
      Your comms array picks up a repeating distress pattern from an alien
      vessel. The signal is genuine, but the situation aboard is unknown.
    category: common
    tags: [alien, risk, weighted]
    guard: "encounter >= 2"
    choices:
      - text: "Board and help"
        outcomes:
          - weight: 50
            outcome: >
              The aliens are grateful. They share navigational data and
              supplies before departing.
            ship: { nav: 0.08, tech: 0.05 }
            fuel: 10
          - weight: 30
            outcome: >
              A misunderstanding turns violent. Your crew repels boarders
              but takes casualties.
            ship: { hull: -0.10, culture: -0.05 }
            colonists: -8
          - weight: 20
            outcome: >
              The alien crew carries compatible technology. They join
              your voyage as allies.
            ship: { tech: 0.12, scanners: 0.05 }
            colonists: 15
      - text: "Send supplies remotely"
        outcome: "You jettison a care package. A grateful reply arrives hours later."
        ship: { culture: 0.08, tech: 0.03 }
        fuel: -10
        energy: -5
        probes: 1
      - text: "Ignore the signal"
        outcome: "The signal fades as you press on. Your crew is uneasy."
        ship: { culture: -0.04 }
        fuel: 5

  - id: seed_probe_discovery
    title: "Ancient Seed Probe"
    narrative: >
      You discover a probe from a long-dead civilization, carrying
      biological samples in stasis. Its activation sequence is intact.
    category: rare
    tags: [alien, discovery, chain]
    guard: "encounter >= 4 and tech > 0.3"
    choices:
      - text: "Activate the probe"
        outcome: >
          The probe hums to life and begins broadcasting. Something
          out there is listening.
        ship: { nav: 0.05, culture: 0.03 }
        energy: -3
        chain:
          event: seed_probe_response
          delay: 4
      - text: "Study the samples"
        outcome: "Careful analysis yields insights into alien biology."
        ship: { tech: 0.08, lifeSignsScanner: 0.10 }
      - text: "Store it in the hold"
        outcome: "The probe is secured. Perhaps it will be useful later."
        ship: { culture: 0.03 }

  - id: seed_probe_response
    title: "Signal Response"
    narrative: >
      The seed probe's broadcast has been answered. An enormous
      living vessel emerges from hyperspace, ancient beyond reckoning.
    category: rare
    tags: [alien, chain, payoff]
    choices:
      - text: "Attempt communication"
        outcomes:
          - weight: 60
            outcome: >
              The vessel shares star charts showing a habitable system
              nearby. Your navigation is recalibrated.
            ship: { nav: 0.15, scanners: 0.08 }
            nextPlanet:
              atmosphere: 0.10
              water: 0.08
              biodiversity: 0.10
          - weight: 40
            outcome: >
              Communication fails. The vessel scans your ship and
              departs, leaving behind a trail of exotic particles.
            ship: { tech: 0.10 }
            fuel: 10
      - text: "Power down and observe"
        outcome: "The vessel ignores you and drifts away. Readings are valuable."
        ship: { tech: 0.05, culture: 0.05, scanners: 0.05 }

  # ═══════════════════════════════════════════════════════════════════════════
  # MUTINY ARC — 3-event chain
  # ═══════════════════════════════════════════════════════════════════════════

  - id: mutiny_whispers
    title: "Whispers Below Decks"
    narrative: >
      Monitoring picks up encrypted chatter between cryopod bays. A
      faction of colonists, led by a charismatic former engineer, believes
      the command crew is hiding the true state of the ship. They want
      representation in navigation decisions.
    category: common
    tags: [crew, drama, chain]
    guard: "encounter >= 3 and culture < 0.7"
    choices:
      - text: "Address their concerns openly"
        outcome: >
          You broadcast the full ship status to every screen. The
          transparency earns grudging respect, but the numbers are
          sobering. Some colonists wish they hadn't asked.
        ship: { culture: 0.10, nav: -0.03 }
      - text: "Invite their leader to the bridge"
        outcome: >
          The engineer is sharp. She points out an inefficiency in the
          power grid you'd missed. Her people stand down — for now.
        ship: { tech: 0.05, culture: 0.05, constructors: 0.03 }
        chain:
          event: mutiny_ultimatum
          delay: 5
      - text: "Increase surveillance and suppress"
        outcome: >
          The encrypted channels go silent. But the silence feels worse
          than the whispers. Trust erodes on both sides.
        ship: { culture: -0.12, shields: 0.05 }
        chain:
          event: mutiny_ultimatum
          delay: 3

  - id: mutiny_ultimatum
    title: "The Ultimatum"
    narrative: >
      The faction has grown. Forty colonists now stand thawed in Cargo
      Bay 7, blocking access to the fuel reserves. Their leader speaks
      calmly: "We're not enemies. We just want a voice. Give us a seat
      at the table, or we shut down the engines."
    category: rare
    tags: [crew, drama, chain, crisis]
    choices:
      - text: "Grant them a council seat"
        outcome: >
          A colonist council is formed. Decisions take longer now, but
          the crew feels ownership of the voyage for the first time.
          Morale soars.
        ship: { culture: 0.08, nav: -0.05, cryopods: -0.05 }
        colonists: 5
      - text: "Negotiate — offer concessions"
        outcomes:
          - weight: 60
            outcome: >
              Hours of tense negotiation yield a compromise. The faction
              gets access to scan data and a monthly briefing. They
              return to cryo satisfied.
            ship: { culture: 0.08, tech: 0.03 }
            colonists: 3
          - weight: 40
            outcome: >
              Negotiations break down over fuel rationing. The standoff
              stretches into a second day. Systems run on backup power.
            ship: { culture: -0.08 }
            fuel: -10
            chain:
              event: mutiny_showdown
              delay: 2
      - text: "Call their bluff — seal the bay"
        outcome: >
          You vent the atmosphere to non-lethal levels. The colonists
          collapse. When they wake in medical, the rebellion is broken
          — but so is something else.
        ship: { culture: -0.10, shields: 0.05 }
        colonists: -3
        chain:
          event: mutiny_showdown
          delay: 4

  - id: mutiny_showdown
    title: "Breaking Point"
    narrative: >
      It was always going to come to this. The faction has seized
      engineering. Life support is stable but the engines are offline.
      Your security chief awaits orders. The colonist leader stands
      behind a barricade of cryopod frames, eyes steady.
    category: rare
    tags: [crew, drama, chain, crisis, climax]
    choices:
      - text: "Storm engineering"
        outcomes:
          - weight: 40
            outcome: >
              The breach is swift and surgical. Three security officers
              are injured. The faction leader surrenders when she sees
              blood. Engineering is restored.
            ship: { hull: -0.05, culture: -0.10, constructors: 0.05, tech: 0.05 }
            colonists: -2
          - weight: 35
            outcome: >
              The assault goes wrong. A stray shot hits the coolant
              manifold. The resulting cascade forces a full section
              evacuation. Both sides suffer.
            ship: { hull: -0.15, culture: -0.15, tech: -0.05 }
            colonists: -12
          - weight: 25
            outcome: >
              Your team finds engineering abandoned. The faction slipped
              away through maintenance shafts. They left the engines
              running — and a note: "We proved our point."
            ship: { culture: -0.05, nav: 0.03 }
      - text: "Cut power to engineering and wait"
        outcome: >
          Twelve cold hours. Then the barricade opens. They're hungry,
          shivering, and ready to talk. No one was hurt. The peace
          holds, fragile as glass.
        ship: { culture: 0.13, tech: -0.08 }
        fuel: -10
        energy: -8
      - text: "Walk in alone, unarmed"
        outcomes:
          - weight: 50
            outcome: >
              The leader stares. Then she laughs. "You're either brave
              or stupid." You sit down. You talk. By dawn, there's a
              plan both sides can live with.
            ship: { culture: 0.12, nav: 0.05 }
          - weight: 30
            outcome: >
              They take you hostage. Three terrifying hours pass before
              your security chief negotiates your release. The faction
              gets most of what they wanted.
            ship: { culture: -0.05, nav: -0.12 }
            colonists: -3
          - weight: 20
            outcome: >
              The leader listens. Then she shows you what they found
              behind the engineering bulkhead — a cracked fuel coupling
              that would have blown in three more jumps. They saved
              the ship.
            ship: { culture: 0.10, hull: 0.05, constructors: 0.05 }

  # ═══════════════════════════════════════════════════════════════════════════
  # GHOST OF EARTH — 3-event branching chain
  # ═══════════════════════════════════════════════════════════════════════════

  - id: earth_final_broadcast
    title: "Signal from Home"
    narrative: >
      The comms array picks up something impossible — a transmission on
      an old Earth frequency. It's faint, distorted by light-years of
      noise, but the header codes are unmistakably from Mission Control.
      The message is incomplete. Boosting the signal would drain
      significant power.
    category: rare
    tags: [earth, emotional, chain]
    guard: "encounter >= 8"
    choices:
      - text: "Boost the signal — we need to hear this"
        outcome: >
          Every watt of spare power feeds into the comms array. The
          static clears, syllable by syllable. The crew gathers in
          silence, tears running freely. Earth has something to say.
        ship: { culture: 0.08 }
        energy: -12
        chain:
          event: earth_goodbye
          delay: 0
      - text: "Record what we can and move on"
        outcome: >
          The fragment is stored: 11 seconds of a woman's voice, calm
          and kind, saying words you can't quite make out. Some crew
          listen to it on repeat. Others can't bear to.
        ship: { culture: 0.05, tech: -0.03 }
        chain:
          event: earth_silence
          delay: 3
      - text: "Don't listen — Earth is behind us"
        outcome: >
          The signal is logged and filed. The crew respects the
          decision, but a quiet grief settles over the ship. Some
          things can't be unfelt.
        ship: { culture: -0.08, nav: 0.05 }

  - id: earth_goodbye
    title: "Humanity's Last Words"
    narrative: >
      The message reassembles through hours of signal processing. It's
      the Director of the Exodus Program. She's old now, her voice
      thin but steady. She knows you'll receive this decades after
      she's gone.
    category: rare
    tags: [earth, emotional, chain, payoff]
    choices:
      - text: "Broadcast to the whole ship"
        outcome: >
          "You carry every song we ever sang, every story we ever told.
          You are not the last of us — you are the first of what comes
          next. We loved you enough to let you go." The ship weeps.
          Then the ship works harder than it ever has.
        ship: { culture: 0.20, cryopods: 0.05, nav: 0.03, constructors: 0.05 }
      - text: "Share it only with the command crew"
        outcome: >
          The bridge crew listens in private. The weight of it — the
          finality — sharpens their focus. They carry it silently,
          a shared burden that binds them.
        ship: { culture: 0.10, nav: 0.08, tech: 0.05 }
      - text: "Archive it for the colony"
        outcome: >
          This message belongs to the future, not the journey. It's
          sealed in the cultural database, to be opened on the day
          the first child is born on the new world.
        ship: { culture: 0.12 }
        nextPlanet:
          atmosphere: 0.05
          biodiversity: 0.03

  - id: earth_silence
    title: "Static"
    narrative: >
      The signal processing completes. The fragment is analyzed,
      enhanced, filtered through every algorithm the ship has. The
      result is definitive: there is no message. It was solar noise
      shaped by wishful thinking. Earth sent nothing. Earth is silent.
    category: rare
    tags: [earth, emotional, chain, payoff]
    choices:
      - text: "Tell the crew the truth"
        outcomes:
          - weight: 60
            outcome: >
              The disappointment is crushing. But something unexpected
              follows — a defiant resolve. "Then we'll be our own
              message," someone says. It catches on.
            ship: { culture: 0.08, nav: 0.03 }
          - weight: 40
            outcome: >
              The news hits hard. Colonists who had been holding onto
              hope now face the void. Cryopod requests spike. The
              corridors feel emptier.
            ship: { culture: -0.12, cryopods: -0.05 }
            colonists: -5
      - text: "Fabricate a hopeful message"
        outcomes:
          - weight: 50
            outcome: >
              The synthetic message is perfect. The crew smiles for the
              first time in weeks. The lie holds. For now.
            ship: { culture: 0.12 }
          - weight: 50
            outcome: >
              A comms technician spots the fabrication. The betrayal
              spreads faster than the fake hope did. Trust in command
              evaporates.
            ship: { culture: -0.20, tech: -0.05 }
      - text: "Say nothing — let the fragment speak for itself"
        outcome: >
          The 11 seconds of noise become the ship's most listened-to
          recording. Everyone hears something different in it. Maybe
          that's enough.
        ship: { culture: 0.05 }

  # ═══════════════════════════════════════════════════════════════════════════
  # STOWAWAY GROWS UP
  # ═══════════════════════════════════════════════════════════════════════════

  - id: stowaway_teenager
    title: "The Ship-Born"
    narrative: >
      The child found in the cargo hold years ago is a teenager now —
      the only person aboard who has never known Earth, never breathed
      unrecycled air, never seen a sky. She's brilliant, restless, and
      has opinions about where the ship should go. She's petitioned
      for a role in navigation.
    category: rare
    tags: [crew, emotional, growth]
    guard: "encounter >= 12 and planetsScanned >= 2"
    choices:
      - text: "Give her a navigation apprenticeship"
        outcome: >
          She takes to stellar cartography like she was born for it —
          which, in a way, she was. Her intuitions about planetary
          systems are uncanny, as if growing up in space gave her an
          instinct for it.
        ship: { nav: 0.08, gravimetricScanner: 0.05, culture: 0.05 }
      - text: "Train her in engineering"
        outcome: >
          She understands the ship's systems the way a native speaker
          understands grammar — not through study but through bone-deep
          familiarity. She optimizes power routing in her first week.
        ship: { tech: 0.08, constructors: 0.05, culture: 0.05 }
        energy: 5
      - text: "Let her choose her own path"
        outcomes:
          - weight: 40
            outcome: >
              She becomes the ship's first historian, documenting the
              voyage with a clarity that makes the crew see themselves
              anew. Morale lifts.
            ship: { culture: 0.15 }
          - weight: 30
            outcome: >
              She disappears into the hydroponics bay and emerges weeks
              later with a new strain of algae that doubles oxygen
              output. She shrugs: "I was bored."
            ship: { tech: 0.05, cryopods: 0.05 }
            nextPlanet:
              biodiversity: 0.05
              atmosphere: 0.03
          - weight: 30
            outcome: >
              She tries everything, masters nothing, but connects people
              across every department. She becomes the ship's heart —
              the person everyone trusts.
            ship: { culture: 0.10, nav: 0.03, tech: 0.03 }

  # ═══════════════════════════════════════════════════════════════════════════
  # COLLECTIVE DOUBT
  # ═══════════════════════════════════════════════════════════════════════════

  - id: collective_doubt
    title: "The Question No One Asks"
    narrative: >
      It starts in the mess hall. A single question, spoken quietly:
      "What if there's nowhere to land?" The words spread like cold
      through the ship. Crew efficiency drops. Arguments break out
      over rationing. For the first time, the mission's success feels
      uncertain to the people carrying it.
    category: common
    tags: [crew, emotional, crisis, morale]
    guard: "hull < 0.6 and colonists < 800"
    choices:
      - text: "Make an inspiring speech"
        outcomes:
          - weight: 55
            outcome: >
              You stand on a cargo crate in the mess and speak from the
              heart. About Earth. About the children in cryo. About
              the stubborn human refusal to die quietly. When you
              finish, someone starts clapping.
            ship: { culture: 0.15, nav: 0.03 }
          - weight: 45
            outcome: >
              The words don't land. Faces stare back, unmoved. "Pretty
              speech," someone mutters. "Show us a planet." The doubt
              deepens.
            ship: { culture: -0.05, nav: -0.03 }
      - text: "Hold an open vote on the mission"
        outcomes:
          - weight: 40
            outcome: >
              The vote is overwhelming: continue. Even the skeptics
              rally once they feel heard. Democracy, it turns out,
              works even in the void.
            ship: { culture: 0.12, nav: 0.05 }
          - weight: 35
            outcome: >
              The vote splits 52-48. The narrow margin satisfies no one.
              Both sides feel vindicated and resentful.
            ship: { culture: -0.03 }
          - weight: 25
            outcome: >
              The vote goes against continuing. You override it — you
              have to. But the cost to trust is enormous.
            ship: { culture: -0.15, nav: 0.08 }
      - text: "Acknowledge the fear honestly"
        outcome: >
          "You're right to be afraid. I'm afraid too. But fear and
          giving up are different things." It's not a speech. It's
          just the truth. Sometimes that's enough.
        ship: { culture: 0.08, cryopods: 0.03 }

  # ═══════════════════════════════════════════════════════════════════════════
  # THE DREAMER'S PETITION
  # ═══════════════════════════════════════════════════════════════════════════

  - id: dreamers_petition
    title: "The Dreamer's Petition"
    narrative: >
      Dr. Yara Osei, a xenobiologist frozen since launch, has filed a
      formal request to be permanently thawed. Her specialty —
      interpreting alien biosignatures — could dramatically improve
      planetary scans. But keeping her awake means continuous life
      support, food, oxygen, and a cryopod that can never be refilled.
    category: common
    tags: [crew, emotional, trade-off, scanner]
    guard: "encounter >= 6 and planetsScanned >= 1"
    choices:
      - text: "Approve — we need her expertise"
        outcome: >
          Dr. Osei emerges from cryo with a gasp and a grin. Within
          hours she's recalibrating the life-signs array with techniques
          no automated system could match. The scans sharpen overnight.
        ship: { lifeSignsScanner: 0.12, waterScanner: 0.05, culture: 0.05 }
        colonists: -1
        energy: -3
      - text: "Deny — we can't spare the resources"
        outcome: >
          The petition is filed and forgotten. Dr. Osei sleeps on. Her
          expertise remains frozen alongside her, a potential that may
          never be realized.
        ship: { culture: -0.03, cryopods: 0.05 }
        energy: 3
      - text: "Compromise — wake her for planetary encounters only"
        outcome: >
          A rotating thaw schedule is established. Dr. Osei is groggy
          each time but effective. The repeated freeze-thaw takes a
          toll on her body, but she insists it's worth it.
        ship: { lifeSignsScanner: 0.06, cryopods: -0.03, culture: 0.03 }

  # ═══════════════════════════════════════════════════════════════════════════
  # NAMES ON THE WALL
  # ═══════════════════════════════════════════════════════════════════════════

  - id: names_on_the_wall
    title: "Names on the Wall"
    narrative: >
      Someone has started etching names into the bulkhead outside
      Cryobay 3. Small letters, careful work. The names of colonists
      who didn't make it. The list is longer than anyone expected.
      Engineering wants to buff it out — it's technically vandalism.
      The crew wants to keep it.
    category: uneventful
    tags: [crew, emotional, memorial, morale]
    guard: "colonists < 900"
    choices:
      - text: "Preserve it — make it official"
        outcome: >
          A small ceremony is held. The list is cleaned, protected
          behind glass, and a light is mounted above it. Crew members
          begin leaving small tokens beneath. It becomes the most
          visited place on the ship.
        ship: { culture: 0.12, cryopods: 0.03 }
      - text: "Move it somewhere more prominent"
        outcome: >
          The memorial is relocated to the main corridor. Every person
          on the ship passes it daily. It's a reminder of cost, but
          also of commitment. No one complains about rations anymore.
        ship: { culture: 0.10, nav: 0.03 }
      - text: "Remove it — we need to look forward"
        outcome: >
          The wall is cleaned. The names are stored in the digital
          archive. Officially, it's the pragmatic choice. But the
          corridor outside Cryobay 3 feels colder now.
        ship: { culture: -0.08, constructors: 0.05 }

  # ═══════════════════════════════════════════════════════════════════════════
  # FALSE PARADISE
  # ═══════════════════════════════════════════════════════════════════════════

  - id: false_paradise
    title: "The Promised World"
    narrative: >
      Long-range scanners light up with something extraordinary — a
      planet ahead with readings that seem too good to be true.
      Breathable atmosphere, liquid water, temperate climate, rich
      mineral deposits. The crew erupts in celebration. But the chief
      science officer pulls you aside: "These readings are impossibly
      clean. Either we just found paradise, or something is spoofing
      our sensors."
    category: rare
    tags: [exploration, late-game, tension, nextPlanet]
    guard: "encounter >= 20 and planetsScanned >= 4"
    choices:
      - text: "Trust the readings — adjust course"
        outcomes:
          - weight: 40
            outcome: >
              It's real. Against all odds, against every cynical
              instinct, the universe delivered. As the planet resolves
              on the viewscreen, the crew falls silent with awe. Home.
            nextPlanet:
              atmosphere: 0.20
              water: 0.20
              temperature: 0.15
              resources: 0.15
              biodiversity: 0.10
            ship: { culture: 0.10, nav: -0.03 }
          - weight: 60
            outcome: >
              The planet resolves into a gas giant wreathed in
              electromagnetic interference. The "readings" were sensor
              ghosts from its radiation belt. The celebration dies.
              Crew morale plummets.
            ship: { culture: -0.15, nav: -0.05 }
            fuel: -10
      - text: "Send probes ahead to verify"
        outcome: >
          Three days of waiting. The probes return mixed data — the
          planet is real but far from paradise. Moderate conditions,
          some promise. Worth a look, nothing more. But honest data
          is worth more than false hope.
        ship: { culture: 0.03, nav: 0.05 }
        probeCost: 2
        nextPlanet:
          atmosphere: 0.05
          water: 0.05
          resources: 0.05
      - text: "Ignore it — we follow the original course"
        outcome: >
          The crew is furious. You may be right to be cautious, but
          the cost is a ship that questions its captain. Still, the
          fuel you saved may matter more in the end.
        ship: { culture: -0.10, nav: 0.05 }
        fuel: 10

  # ═══════════════════════════════════════════════════════════════════════════
  # THE FINAL GAMBLE
  # ═══════════════════════════════════════════════════════════════════════════

  - id: final_gamble
    title: "The Final Gamble"
    narrative: >
      Fuel reserves are critical. The navigation computer presents two
      options: the charted route — safe but fuel-hungry, requiring
      every drop you have left — or an uncharted shortcut through a
      region of gravitational anomalies. The shortcut could save half
      your remaining fuel. It could also tear the ship apart.
    category: rare
    tags: [late-game, tension, risk, fuel]
    guard: "fuel < 50 and encounter >= 18"
    choices:
      - text: "Take the shortcut"
        outcomes:
          - weight: 45
            outcome: >
              The anomalies are navigable — barely. The ship groans
              through gravitational eddies that bend the corridors
              visibly. But the fuel gauge holds. You emerge intact,
              lighter and luckier.
            ship: { hull: -0.05, nav: 0.05 }
            fuel: 20
          - weight: 30
            outcome: >
              A gravitational shear catches the port side. Hull plates
              buckle. The cryobay shakes hard enough to crack seals.
              You make it through, but the ship carries new scars.
            ship: { hull: -0.15, cryopods: -0.08, nav: -0.05 }
            fuel: 5
            colonists: -8
          - weight: 25
            outcome: >
              The shortcut opens into a pocket of calm — a gravitational
              sweet spot between anomalies. The ship coasts in freefall
              for hours, burning almost nothing. The navigator calls
              it a miracle.
            ship: { hull: 0.03, nav: 0.08 }
            fuel: 30
      - text: "Stay the course — use every drop"
        outcome: >
          The safe route drains the tanks to fumes. Every system is
          rationed. The lights dim. But the ship holds together, and
          the course is true.
        ship: { nav: 0.05, hull: 0.05, shields: 0.03 }
        fuel: -12
        energy: -5
      - text: "Cut speed and drift — conserve everything"
        outcome: >
          The engines throttle down to minimum burn. Days stretch into
          weeks of drifting. The silence is maddening, but the fuel
          gauge stops falling. You'll arrive late, but you'll arrive.
        ship: { culture: -0.08, nav: -0.05, shields: 0.05 }
        fuel: 8
        energy: -5
  - id: power_diversion
    title: "Cascading Overload"
    narrative: >
      A power surge ripples through the ship's grid. Three critical
      systems are failing simultaneously — you only have enough
      reserve energy to save two. The third will take serious damage.
    category: malfunction
    tags: [malfunction, energy-sink, trade-off]
    choices:
      - text: "Save navigation and cryopods"
        outcome: >
          Energy floods into nav computers and cryogenic cooling.
          Both stabilize. The hull monitoring system goes dark —
          stress fractures will go undetected until the next scan.
        ship: { nav: 0.05, cryopods: 0.05, hull: -0.12 }
        energy: -10
      - text: "Save hull integrity and navigation"
        outcome: >
          Structural reinforcement and course correction get priority.
          The cryopod bay temperature spikes briefly. Most pods hold,
          but the oldest units fail.
        ship: { hull: 0.05, nav: 0.05, cryopods: -0.10 }
        energy: -10
        colonists: -8
      - text: "Save cryopods and hull"
        outcome: >
          Life preservation takes priority. The navigation system
          reboots from scratch, losing accumulated calibration data.
          You'll be flying partially blind for a while.
        ship: { cryopods: 0.05, hull: 0.05, nav: -0.12, gravimetricScanner: -0.05 }
        energy: -10
      - text: "Emergency shutdown — save everything at energy cost"
        outcome: >
          A full system restart. Every light goes dark for ninety
          terrifying seconds. When power returns, everything works —
          but the energy reserves are gutted.
        ship: { hull: -0.03, nav: -0.03, cryopods: -0.03 }
        energy: -25

  - id: emergency_burn
    title: "Debris Field Alert"
    narrative: >
      Proximity sensors scream. A cloud of metallic debris — remnants
      of some ancient collision — fills the space ahead. At current
      speed, impact is inevitable. The engines can push through with
      a hard burn, but it will cost precious fuel.
    category: malfunction
    tags: [hazard, fuel-sink]
    choices:
      - text: "Emergency burn — full thrust"
        outcome: >
          The engines roar to life at maximum output. The ship lurches
          sideways, threading through gaps in the debris. Fuel gauges
          drop visibly, but the hull stays intact.
        ship: { nav: 0.03 }
        fuel: -15
      - text: "Shields up — push through"
        outcome: >
          The debris hammers the shields and hull alike. Fragments
          ping off the exterior like metallic rain. When it's over,
          the damage is real but manageable.
        ship: { hull: -0.12, shields: -0.08 }
      - text: "Divert energy to point defense"
        outcome: >
          Power floods into the automated defense grid. Lasers pick
          off the largest fragments while the ship weaves through the
          rest. Effective, but the energy reserves take a hit.
        ship: { hull: -0.03, shields: -0.03 }
        energy: -12

  - id: deep_scan_opportunity
    title: "Scanning Window"
    narrative: >
      A rare alignment of gravitational lenses creates a brief window
      of extraordinary clarity. For the next few hours, your scanners
      could reach systems light-years ahead — but only if you divert
      significant energy to the sensor arrays.
    category: common
    tags: [exploration, energy-sink, nextPlanet]
    guard: "planetsScanned >= 1"
    choices:
      - text: "Full power to sensors"
        outcome: >
          The scanner arrays drink power like water. Images resolve
          of distant worlds — atmospheric composition, water signatures,
          mineral deposits. When the window closes, you have a treasure
          trove of data about what lies ahead.
        ship: { atmosphericScanner: 0.05, mineralScanner: 0.05 }
        energy: -15
        nextPlanet:
          atmosphere: 0.08
          water: 0.06
          resources: 0.05
          biodiversity: 0.03
      - text: "Moderate scan — balance power"
        outcome: >
          A cautious approach yields partial data. The readings are
          useful but incomplete — enough to know there's something
          promising ahead, not enough to know what.
        ship: { atmosphericScanner: 0.03 }
        energy: -6
        nextPlanet:
          atmosphere: 0.03
          water: 0.03
      - text: "Log the coordinates and save power"
        outcome: >
          The window passes unused. The coordinates are stored for
          future reference. Some of the crew look disappointed, but
          the energy reserves hold steady.
        ship: { culture: -0.03, nav: 0.03 }

  - id: fuel_cache_gamble
    title: "Abandoned Fuel Depot"
    narrative: >
      Long-range sensors detect a structure matching pre-war fuel depot
      schematics. It's off-course — reaching it means burning fuel to
      get there. The depot could be fully stocked, partially looted,
      or completely empty. Detour or stay the course?
    category: common
    tags: [exploration, fuel-sink, risk, weighted]
    choices:
      - text: "Detour to the depot"
        outcomes:
          - weight: 35
            outcome: >
              The depot is intact. Automated systems still function.
              Fuel flows into your tanks as the crew cheers. The
              detour paid for itself ten times over.
            fuel: 40
            ship: { hull: 0.03 }
          - weight: 40
            outcome: >
              The depot has been partially scavenged. Some fuel remains
              in the lower tanks — enough to offset the detour cost
              with a modest surplus.
            fuel: 8
          - weight: 25
            outcome: >
              Empty. Stripped clean centuries ago. The detour cost you
              fuel you couldn't afford to lose. The crew is silent on
              the flight back to course.
            ship: { culture: -0.05 }
        fuel: -15
      - text: "Send a probe to check first"
        outcome: >
          The probe confirms partial fuel reserves. Not enough to
          justify the full detour, but a targeted extraction run
          brings back a modest haul.
        fuel: 5
        probeCost: 1
      - text: "Stay on course"
        outcome: >
          The depot shrinks on the rear sensors. Maybe it was full.
          You'll never know. The crew understands, but some stare
          at the fuel gauge a little longer than usual.
        ship: { culture: -0.03, nav: 0.03 }

  - id: solar_recharge_risk
    title: "Solar Slingshot"
    narrative: >
      A young star blazes ahead. Its radiation is intense but its
      energy is free. A close pass could recharge depleted systems —
      fuel cells, batteries, even the solar panels themselves. But
      "close" near a star means hull stress, radiation exposure, and
      a narrow margin between recharge and incineration.
    category: common
    tags: [cosmic, fuel-sink, energy-sink, risk, weighted]
    guard: "fuel < 100 or energy < 20"
    choices:
      - text: "Close pass — maximum recharge"
        outcomes:
          - weight: 50
            outcome: >
              The hull glows cherry-red. Alarms blare. But the solar
              collectors drink deep, and the fuel cells surge with
              converted radiation. When you pull away, the ship is
              battered but brimming with power.
            ship: { hull: -0.08, shields: -0.05 }
            fuel: 25
            energy: 15
          - weight: 30
            outcome: >
              A solar flare catches the port side mid-pass. The
              recharge is partial — some collectors burned out before
              they could fill. Worth it, barely.
            ship: { hull: -0.12, shields: -0.08, atmosphericScanner: -0.05 }
            fuel: 12
            energy: 8
          - weight: 20
            outcome: >
              Perfect execution. The navigator threads the gravity
              well like a needle. Full recharge, minimal exposure.
              The crew applauds.
            ship: { hull: -0.03, nav: 0.05 }
            fuel: 35
            energy: 20
      - text: "Safe distance — partial recharge"
        outcome: >
          A conservative orbit captures steady solar energy over
          several hours. No drama, no damage, no stories to tell.
          The gauges climb slowly but surely.
        ship: { culture: 0.03 }
        fuel: 10
        energy: 8
      - text: "Burn fuel to slingshot past"
        outcome: >
          You use the star's gravity to accelerate, trading proximity
          for speed. No recharge, but the momentum boost saves fuel
          on the next leg of the journey.
        fuel: -8
        ship: { nav: 0.05, hull: 0.03 }
