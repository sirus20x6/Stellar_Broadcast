# Starbound Exodus — Statechart Event Definitions
#
# All 134 events converted from Dart + 5 new statechart events.
#
# Format reference:
#   @key      — l10n key lookup (resolved at load time)
#   guard     — state predicate: "hull > 0.3 and fuel >= 50"
#   outcomes  — weighted random (replaces single outcome on a choice)
#   chain     — triggers a follow-up event after N encounters
#   route     — dedicated cinematic screen (default: /event)
#   tags      — metadata for filtering and visualization

