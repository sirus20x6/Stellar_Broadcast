<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Broadcast — Ship Damage Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0B1426;
    color: white;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
  }
  canvas { width: 100%; max-width: 420px; aspect-ratio: 420/700; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 840;
canvas.height = 1400;
const W = canvas.width, H = canvas.height, CX = W/2;

// ── Systems ──
const S = {
  hull:60, nav:40, cryopods:90, culture:70, tech:80, constructors:50,
  shields:30, landing:45,
  scanner1:70, scanner2:55, scanner3:85, scanner4:60, scanner5:40, scanner6:75,
};
const v = id => (S[id]??100)/100;

function hc(v){
  if(v>0.7) return [0,229,255];
  if(v>0.4) return [255,152,0];
  return [255,23,68];
}
function hcs(v,a=1){const c=hc(v);return `rgba(${c[0]},${c[1]},${c[2]},${a})`;}

let frame=0;
const sparks=[];

// ── Ship section paths ──
function pathNav(){
  const p=new Path2D();
  p.moveTo(CX,80);
  p.bezierCurveTo(CX+12,130,CX+40,200,CX+55,270);
  p.lineTo(CX+48,290);
  p.lineTo(CX+35,310);
  p.lineTo(CX-35,310);
  p.lineTo(CX-48,290);
  p.lineTo(CX-55,270);
  p.bezierCurveTo(CX-40,200,CX-12,130,CX,80);
  p.closePath();return p;
}
function pathCryopods(){
  const p=new Path2D();
  p.moveTo(CX-35,310);
  p.lineTo(CX-50,320);
  p.lineTo(CX-68,350);
  p.bezierCurveTo(CX-76,400,CX-78,500,CX-72,580);
  p.lineTo(CX-55,610);
  p.lineTo(CX+55,610);
  p.lineTo(CX+72,580);
  p.bezierCurveTo(CX+78,500,CX+76,400,CX+68,350);
  p.lineTo(CX+50,320);
  p.lineTo(CX+35,310);
  p.closePath();return p;
}
function pathCulture(){
  const p=new Path2D();
  p.moveTo(CX-55,610);
  p.bezierCurveTo(CX-62,635,CX-65,670,CX-60,710);
  p.lineTo(CX-50,730);
  p.lineTo(CX+50,730);
  p.lineTo(CX+60,710);
  p.bezierCurveTo(CX+65,670,CX+62,635,CX+55,610);
  p.closePath();return p;
}
function pathTech(){
  const p=new Path2D();
  p.moveTo(CX-50,730);
  p.lineTo(CX-62,745);
  p.lineTo(CX-72,785);
  p.lineTo(CX-78,850);
  p.lineTo(CX-65,900);
  p.lineTo(CX+65,900);
  p.lineTo(CX+78,850);
  p.lineTo(CX+72,785);
  p.lineTo(CX+62,745);
  p.lineTo(CX+50,730);
  p.closePath();return p;
}
function pathConstructors(){
  const p=new Path2D();
  p.moveTo(CX-65,900);
  p.lineTo(CX-82,915);
  p.lineTo(CX-125,960);
  p.lineTo(CX-142,1020);
  p.lineTo(CX-130,1080);
  p.lineTo(CX-100,1110);
  p.lineTo(CX-75,1110);
  p.lineTo(CX-60,1095);
  p.lineTo(CX+60,1095);
  p.lineTo(CX+75,1110);
  p.lineTo(CX+100,1110);
  p.lineTo(CX+130,1080);
  p.lineTo(CX+142,1020);
  p.lineTo(CX+125,960);
  p.lineTo(CX+82,915);
  p.lineTo(CX+65,900);
  p.closePath();return p;
}
function pathLanding(){
  const p=new Path2D();
  p.moveTo(CX-60,1095);
  p.lineTo(CX-72,1120);
  p.bezierCurveTo(CX-78,1160,CX-72,1210,CX-55,1260);
  p.bezierCurveTo(CX-35,1290,CX-12,1300,CX,1305);
  p.bezierCurveTo(CX+12,1300,CX+35,1290,CX+55,1260);
  p.bezierCurveTo(CX+72,1210,CX+78,1160,CX+72,1120);
  p.lineTo(CX+60,1095);
  p.closePath();return p;
}
function pathFullShip(){
  const p=new Path2D();
  p.moveTo(CX,80);
  p.bezierCurveTo(CX+12,130,CX+40,200,CX+55,270);
  p.lineTo(CX+68,350);
  p.bezierCurveTo(CX+78,440,CX+78,540,CX+72,580);
  p.lineTo(CX+62,640);
  p.lineTo(CX+72,785);
  p.lineTo(CX+78,850);
  p.lineTo(CX+82,915);
  p.lineTo(CX+125,960);
  p.lineTo(CX+142,1020);
  p.lineTo(CX+130,1080);
  p.lineTo(CX+100,1110);
  p.lineTo(CX+78,1160);
  p.bezierCurveTo(CX+72,1210,CX+55,1260,CX+30,1290);
  p.bezierCurveTo(CX+12,1302,CX,1305,CX,1305);
  p.bezierCurveTo(CX,1305,CX-12,1302,CX-30,1290);
  p.bezierCurveTo(CX-55,1260,CX-72,1210,CX-78,1160);
  p.lineTo(CX-100,1110);
  p.lineTo(CX-130,1080);
  p.lineTo(CX-142,1020);
  p.lineTo(CX-125,960);
  p.lineTo(CX-82,915);
  p.lineTo(CX-78,850);
  p.lineTo(CX-72,785);
  p.lineTo(CX-62,640);
  p.lineTo(CX-72,580);
  p.bezierCurveTo(CX-78,540,CX-78,440,CX-68,350);
  p.lineTo(CX-55,270);
  p.bezierCurveTo(CX-40,200,CX-12,130,CX,80);
  p.closePath();return p;
}

// Scanner pod positions
const scannerPods=[
  {x:CX-80,y:380,angle:-0.3,id:'scanner1',label:'ATMO'},
  {x:CX+80,y:380,angle:0.3,id:'scanner2',label:'GRAV'},
  {x:CX-80,y:530,angle:-0.2,id:'scanner3',label:'MINRL'},
  {x:CX+80,y:530,angle:0.2,id:'scanner4',label:'LIFE'},
  {x:CX-135,y:1020,angle:-0.4,id:'scanner5',label:'TEMP'},
  {x:CX+135,y:1020,angle:0.4,id:'scanner6',label:'WATER'},
];

// Bar positions aligned to section midpoints
// Left: core systems next to their sections
// Right: shields at top, scanners near their pods
const barDefs=[
  // Left column — aligned to section centers
  {id:'nav',          label:'NAV',     side:'left',  barY: 195},
  {id:'cryopods',     label:'CRYO',    side:'left',  barY: 460},
  {id:'culture',      label:'CULTURE', side:'left',  barY: 670},
  {id:'tech',         label:'TECH',    side:'left',  barY: 815},
  {id:'constructors', label:'CONST',   side:'left',  barY: 1005},
  {id:'landing',      label:'LANDING', side:'left',  barY: 1198},
  {id:'hull',         label:'HULL',    side:'left',  barY: 120},  // top, wraps whole ship
  // Right column — shields + scanners near their physical locations
  {id:'shields',      label:'SHIELDS', side:'right', barY: 120},  // top, wraps whole ship
];

// Assign barY to scanner pods based on their actual Y position on the hull
// But enforce minimum spacing of 50px between right-column bars
(function() {
  // Right column occupied positions: shields at 120, then scanners
  // Sort scanners by their pod Y, then space them with min gap
  const sorted = [...scannerPods].sort((a,b) => a.y - b.y);
  let lastY = 120 + 50; // after shields bar
  sorted.forEach(sp => {
    const idealY = sp.y;
    sp.barY = Math.max(idealY, lastY);
    lastY = sp.barY + 50;
  });
})();

const sectionPaths=[
  {path:pathNav,id:'nav'},
  {path:pathCryopods,id:'cryopods'},
  {path:pathCulture,id:'culture'},
  {path:pathTech,id:'tech'},
  {path:pathConstructors,id:'constructors'},
  {path:pathLanding,id:'landing'},
];

const sectionBounds={
  nav:{xMin:CX-55,xMax:CX+55,yMin:80,yMax:310},
  cryopods:{xMin:CX-75,xMax:CX+75,yMin:310,yMax:610},
  culture:{xMin:CX-62,xMax:CX+62,yMin:610,yMax:730},
  tech:{xMin:CX-75,xMax:CX+75,yMin:730,yMax:900},
  constructors:{xMin:CX-140,xMax:CX+140,yMin:900,yMax:1110},
  landing:{xMin:CX-72,xMax:CX+72,yMin:1095,yMax:1300},
};

function spawnSpark(x,y){
  if(sparks.length>=50)return;
  sparks.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-2,
    life:1,decay:0.02+Math.random()*0.04,size:1+Math.random()*2.5});
}

// ── Drawing functions ──

function drawStars(){
  for(let i=0;i<120;i++){
    const sx=((42*(i+1)*7919)%W);
    const sy=((42*(i+1)*104729)%H);
    const b=0.06+(((42*(i+1)*31)%100)/100)*0.2;
    const t=Math.sin(frame*0.015+i*1.7)*0.15+0.85;
    ctx.fillStyle=`rgba(180,200,240,${b*t})`;
    ctx.fillRect(sx,sy,1,1);
  }
}

function drawShipBase(){
  const path=pathFullShip();
  const hv=v('hull');
  const c=hc(hv);
  ctx.save();
  ctx.fillStyle='#0c1524';
  ctx.fill(path);
  ctx.clip(path);
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.035)`;
  ctx.lineWidth=0.5;
  for(let y=90;y<1300;y+=25){ctx.beginPath();ctx.moveTo(CX-150,y);ctx.lineTo(CX+150,y);ctx.stroke();}
  for(let x=CX-150;x<=CX+150;x+=25){ctx.beginPath();ctx.moveTo(x,80);ctx.lineTo(x,1300);ctx.stroke();}
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.08)`;
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(CX,90);ctx.lineTo(CX,1300);ctx.stroke();
  ctx.restore();
  ctx.strokeStyle=hcs(hv,0.5+Math.sin(frame*0.03)*0.1);
  ctx.lineWidth=1.5;
  ctx.stroke(path);
  ctx.save();
  ctx.shadowColor=hcs(hv,0.2);ctx.shadowBlur=12;
  ctx.strokeStyle=hcs(hv,0.12);ctx.lineWidth=1;ctx.stroke(path);
  ctx.restore();
}

function drawSectionFill(def){
  const path=def.path();
  const val=v(def.id);
  const c=hc(val);
  const b=sectionBounds[def.id];

  ctx.save();
  ctx.clip(path);

  // Fill
  ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.02+val*0.06})`;
  ctx.fill(path);

  // Internal details
  if(def.id==='cryopods'){
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.05+val*0.1})`;
    ctx.lineWidth=0.5;
    for(let row=0;row<6;row++){
      for(let col=-2;col<=2;col++){
        ctx.beginPath();ctx.arc(CX+col*26,350+row*42,7,0,Math.PI*2);ctx.stroke();
      }
    }
  }
  if(def.id==='nav'){
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.15+val*0.25})`;ctx.lineWidth=1;
    for(let i=-1;i<=1;i++){ctx.beginPath();ctx.ellipse(CX+i*22,240,7,12,0,0,Math.PI*2);ctx.stroke();}
  }
  if(def.id==='culture'){
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.06+val*0.1})`;ctx.lineWidth=0.8;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(CX,670,22+i*14,0,Math.PI*2);ctx.stroke();}
  }
  if(def.id==='tech'){
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.04+val*0.06})`;ctx.lineWidth=0.5;
    for(let y=750;y<890;y+=18){ctx.beginPath();ctx.moveTo(CX-55,y);ctx.lineTo(CX+55,y);ctx.stroke();}
  }
  if(def.id==='constructors'){
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.04+val*0.06})`;ctx.lineWidth=0.5;
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(CX+i*18,920);ctx.lineTo(CX+i*35,1095);ctx.stroke();}
  }

  // Cracks (<50%)
  if(val<0.5&&b){
    const n=Math.floor((1-val)*6);
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.15+(1-val)*0.35})`;
    ctx.lineWidth=0.6;
    const bw=b.xMax-b.xMin,bh=b.yMax-b.yMin;
    for(let i=0;i<n;i++){
      const seed=def.id.charCodeAt(0)*137+i*73;
      let x=b.xMin+((seed*7919)%bw),y=b.yMin+((seed*104729)%bh);
      const ang=((seed*31)%628)/100,seg=6+((seed*13)%8);
      ctx.beginPath();ctx.moveTo(x,y);
      for(let j=0;j<5;j++){
        const jit=((seed*(j+1)*47)%100-50)/100;
        x+=Math.cos(ang+jit)*seg;y+=Math.sin(ang+jit)*seg;ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  }

  // Scorch (<30%)
  if(val<0.3&&b){
    const n=Math.floor((1-val)*5);
    for(let i=0;i<n;i++){
      const seed=(def.id.charCodeAt(1)||65)*97+i*53;
      const px=b.xMin+((seed*7919)%(b.xMax-b.xMin));
      const py=b.yMin+((seed*31337)%(b.yMax-b.yMin));
      const pr=5+((seed*71)%14);
      const grad=ctx.createRadialGradient(px,py,0,px,py,pr);
      grad.addColorStop(0,`rgba(0,0,0,${0.4+(1-val)*0.3})`);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grad;ctx.beginPath();ctx.ellipse(px,py,pr,pr*0.6,seed%3,0,Math.PI*2);ctx.fill();
    }
  }

  // Critical pulse (<20%)
  if(val<0.2){
    const pulse=Math.sin(frame*0.15)*0.5+0.5;
    ctx.fillStyle=`rgba(255,23,68,${pulse*0.12})`;ctx.fill(path);
    if(Math.random()<0.25&&b){
      spawnSpark(b.xMin+Math.random()*(b.xMax-b.xMin),b.yMin+Math.random()*(b.yMax-b.yMin));
    }
  }

  ctx.restore();

  // Outline
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.12)`;ctx.lineWidth=0.5;ctx.stroke(path);
}

function drawHealthBar(def){
  const val=v(def.id);
  const c=hc(val);
  const isLeft=def.side==='left';

  const barW=130;
  const barH=14;
  const shipEdge=isLeft?(CX-90):(CX+90);
  const barX=isLeft?(shipEdge-22-barW):(shipEdge+22);
  const barY=def.barY-barH/2;

  // Leader line
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.15)`;
  ctx.lineWidth=0.5;
  ctx.setLineDash([2,4]);
  ctx.beginPath();
  ctx.moveTo(isLeft?barX+barW+2:barX-2,def.barY);
  ctx.lineTo(isLeft?shipEdge+5:shipEdge-5,def.barY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Bar background
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.1)`;
  ctx.lineWidth=0.5;
  ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,4);ctx.fill();ctx.stroke();

  // Bar fill with gradient
  const fillW=barW*val;
  if(fillW>0){
    const grad=ctx.createLinearGradient(barX,barY,barX+fillW,barY);
    grad.addColorStop(0,hcs(val,0.75));
    grad.addColorStop(1,hcs(val,0.4));
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.roundRect(barX,barY,fillW,barH,4);ctx.fill();
    // Glow
    ctx.save();
    ctx.shadowColor=hcs(val,0.3);ctx.shadowBlur=6;
    ctx.fillStyle=hcs(val,0.2);
    ctx.beginPath();ctx.roundRect(barX,barY,fillW,barH,4);ctx.fill();
    ctx.restore();
  }

  // Label + percentage
  ctx.font='11px "Orbitron"';
  ctx.fillStyle=hcs(val,0.6);
  ctx.textAlign='left';
  ctx.fillText(def.label,barX,barY-7);

  ctx.font='13px "Share Tech Mono"';
  ctx.fillStyle=hcs(val,0.9);
  ctx.textAlign='right';
  ctx.fillText(`${Math.round(val*100)}%`,barX+barW,barY-7);
}

function drawScannerBar(sp){
  const val=v(sp.id);
  const c=hc(val);

  // Always right column
  const barW=130;
  const barH=14;
  const shipEdge=CX+90;
  const barX=shipEdge+22;
  const barY=sp.barY-barH/2;

  // Leader line from bar to scanner pod
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.12)`;
  ctx.lineWidth=0.5;
  ctx.setLineDash([2,4]);
  ctx.beginPath();
  ctx.moveTo(barX-2,sp.barY);
  // Bend toward the pod
  const midX=shipEdge-10;
  ctx.lineTo(midX,sp.barY);
  ctx.lineTo(sp.x+(sp.x>CX?12:-12),sp.y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Bar bg
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.1)`;
  ctx.lineWidth=0.5;
  ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,4);ctx.fill();ctx.stroke();

  // Bar fill
  const fillW=barW*val;
  if(fillW>0){
    const grad=ctx.createLinearGradient(barX,barY,barX+fillW,barY);
    grad.addColorStop(0,hcs(val,0.75));
    grad.addColorStop(1,hcs(val,0.4));
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.roundRect(barX,barY,fillW,barH,4);ctx.fill();
    ctx.save();
    ctx.shadowColor=hcs(val,0.3);ctx.shadowBlur=6;
    ctx.fillStyle=hcs(val,0.2);
    ctx.beginPath();ctx.roundRect(barX,barY,fillW,barH,4);ctx.fill();
    ctx.restore();
  }

  // Label + %
  ctx.font='11px "Orbitron"';
  ctx.fillStyle=hcs(val,0.6);
  ctx.textAlign='left';
  ctx.fillText(sp.label,barX,barY-7);

  ctx.font='13px "Share Tech Mono"';
  ctx.fillStyle=hcs(val,0.9);
  ctx.textAlign='right';
  ctx.fillText(`${Math.round(val*100)}%`,barX+barW,barY-7);
}

function drawShields(){
  const val=v('shields');
  const c=hc(val);
  const segs=16,active=Math.ceil(val*segs);
  ctx.save();
  for(let i=0;i<segs;i++){
    if(i>=active&&((i*137)%3!==0))continue;
    const angle=(Math.PI*2/segs)*i-Math.PI/2;
    const next=angle+(Math.PI*2/segs)*0.75;
    const shimmer=Math.sin(frame*0.04+i*0.9)*0.3+0.7;
    const a=(0.04+val*0.18)*shimmer;
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${a})`;
    ctx.lineWidth=1.5;
    ctx.shadowColor=`rgba(${c[0]},${c[1]},${c[2]},${a*0.4})`;
    ctx.shadowBlur=10;
    ctx.beginPath();ctx.ellipse(CX,690,165,630,0,angle,next);ctx.stroke();
  }
  ctx.restore();
}

function drawScannerPods(){
  scannerPods.forEach(sp=>{
    const val=v(sp.id);
    const c=hc(val);
    ctx.save();ctx.translate(sp.x,sp.y);ctx.rotate(sp.angle);
    ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},0.15)`;
    ctx.beginPath();ctx.ellipse(0,0,10,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.4+val*0.6})`;
    ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
    ctx.shadowColor=`rgba(${c[0]},${c[1]},${c[2]},${val*0.4})`;ctx.shadowBlur=8;ctx.fill();
    if(val>0.1){
      const sa=(frame*0.04+sp.x*0.01)%(Math.PI*2);
      const len=14+val*18;
      const grad=ctx.createLinearGradient(0,0,Math.cos(sa)*len,Math.sin(sa)*len);
      grad.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${val*0.3})`);
      grad.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
      ctx.strokeStyle=grad;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(sa)*len,Math.sin(sa)*len);ctx.stroke();
    }
    if(val<0.2&&Math.random()<0.12){
      ctx.fillStyle='rgba(255,23,68,0.7)';ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
}

function drawEngines(){
  const tv=v('tech');
  const pulse=Math.sin(frame*0.06)*0.3+0.7;
  const intensity=tv*pulse;
  [CX-30,CX,CX+30].forEach(ex=>{
    const grad=ctx.createRadialGradient(ex,1290,0,ex,1330,40);
    grad.addColorStop(0,`rgba(100,200,255,${intensity*0.7})`);
    grad.addColorStop(0.3,`rgba(0,229,255,${intensity*0.4})`);
    grad.addColorStop(1,'rgba(0,100,200,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.ellipse(ex,1320,12,35,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(220,240,255,${intensity*0.8})`;
    ctx.beginPath();ctx.arc(ex,1298,4,0,Math.PI*2);ctx.fill();
  });
}

function drawNavBeam(){
  const nv=v('nav');
  if(nv<0.05)return;
  const pulse=Math.sin(frame*0.04)*0.3+0.7;
  const grad=ctx.createLinearGradient(CX,85,CX,10);
  grad.addColorStop(0,hcs(nv,nv*pulse*0.35));
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.moveTo(CX-8,85);ctx.lineTo(CX-22,10);ctx.lineTo(CX+22,10);ctx.lineTo(CX+8,85);ctx.fill();
}

function drawSparks(){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;s.vx*=0.96;s.vy*=0.96;
    if(s.life<=0){sparks.splice(i,1);continue;}
    ctx.fillStyle=`rgba(255,200,100,${s.life})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2);ctx.fill();
    ctx.save();
    ctx.shadowColor=`rgba(255,150,50,${s.life*0.4})`;ctx.shadowBlur=5;
    ctx.fillStyle=`rgba(255,220,150,${s.life*0.4})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.size*s.life*0.6,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawTitle(){
  ctx.font='16px "Orbitron"';
  ctx.fillStyle='rgba(0,229,255,0.6)';
  ctx.textAlign='center';
  ctx.fillText('SHIP STATUS',CX,50);
}

// ── Interactivity — click bars to cycle health ──
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;
  const mx=(e.clientX-rect.left)*scaleX,my=(e.clientY-rect.top)*scaleY;

  // Check all bars
  const allBars=[...barDefs,...scannerPods.map(sp=>({
    id:sp.id,side:'right',barY:sp.barY
  }))];

  allBars.forEach(def=>{
    const isLeft=def.side==='left';
    const barW=130,barH=14;
    const shipEdge=isLeft?(CX-90):(CX+90);
    const barX=isLeft?(shipEdge-22-barW):(shipEdge+22);
    const barY=def.barY-barH/2;

    if(mx>=barX&&mx<=barX+barW&&my>=barY-15&&my<=barY+barH+5){
      // Cycle: 100 → 80 → 60 → 40 → 20 → 5 → 100
      const cur=S[def.id];
      const steps=[100,80,60,40,20,5];
      const idx=steps.indexOf(cur);
      S[def.id]=steps[(idx+1)%steps.length];
    }
  });
});

function render(){
  frame++;
  ctx.clearRect(0,0,W,H);
  drawStars();
  drawTitle();
  drawNavBeam();
  drawShields();
  drawShipBase();
  sectionPaths.forEach(drawSectionFill);
  drawScannerPods();
  drawEngines();
  drawSparks();

  // Health bars — all same size
  barDefs.forEach(drawHealthBar);
  scannerPods.forEach(drawScannerBar);

  requestAnimationFrame(render);
}
render();
</script>
</body>
