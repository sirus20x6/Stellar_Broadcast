name: stellar_broadcast
description: "Humanity's last colony ship searches for a new home among the stars."
publish_to: 'none'
version: 2.2.14+126

environment:
  sdk: ^3.8.0
  flutter: ^3.32.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Pinned to ^0.20 to match flutter_localizations 3.32 transitive constraint.
  # `any` was used here because flutter_localizations dictates the version, but
  # explicit pinning prevents accidental upgrades to incompatible majors.
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  quickapps_play_games:
    path: ../../packages/quickapps_play_games
  firebase_core: ^4.0.0
  firebase_crashlytics: ^5.0.0
  firebase_remote_config: ^6.0.0
  logging: ^1.3.0
  http: ^1.2.0
  firebase_performance: ^0.11.0
  flutter_riverpod: ^3.0.0
  flame_audio: ^2.12.0
  onnxruntime_v2: ^1.23.2
  yaml: ^3.1.0

  # Shared packages
  package_info_plus: ^9.0.0
  share_plus: ^10.1.4
  path_provider: ^2.1.0
  app_links: ^6.0.0

  # iOS App Tracking Transparency (direct dep because main.dart calls
  # requestTrackingAuthorization during bootstrap, before any ads SDK
  # initializes — Apple requires ATT as the authoritative tracking
  # permission mechanism).
  app_tracking_transparency: ^2.0.6

  quickapps_storage:
    path: ../../packages/quickapps_storage
  quickapps_ui:
    path: ../../packages/quickapps_ui
  quickapps_ads:
    path: ../../packages/quickapps_ads
  google_mobile_ads: ^8.0.0
  quickapps_analytics:
    path: ../../packages/quickapps_analytics
  quickapps_onboarding:
    path: ../../packages/quickapps_onboarding
  quickapps_audio:
    path: ../../packages/quickapps_audio
  quickapps_logging:
    path: ../../packages/quickapps_logging
  quickapps_iap:
    path: ../../packages/quickapps_iap
  quickapps_debug:
    path: ../../packages/quickapps_debug
  window_manager: ^0.4.0
  url_launcher: ^6.3.0
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  msix: ^3.16.0

msix_config:
  display_name: Stellar Broadcast
  publisher_display_name: Faustian Bargain
  identity_name: com.quickapps.stellarbroadcast
  msix_version: 2.0.0.0
  logo_path: assets/Icon_512.png
  capabilities: internetClient

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/Icon_512.png"
  adaptive_icon_background: "#0a0e1a"
  adaptive_icon_foreground: "assets/Icon_512.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/models/planet_namer_fp16.onnx
    - assets/models/vocab.json
    - assets/events/
    - assets/Icon_512.png
