name: stellar_broadcast
description: "Humanity's last colony ship searches for a new home among the stars."
publish_to: 'none'
version: 2.0.2+83

environment:
  sdk: ^3.8.0
  flutter: ^3.32.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  quickapps_play_games:
    path: ../../packages/quickapps_play_games
  firebase_core: ^3.0.0
  flutter_riverpod: ^2.6.1
  audioplayers: ^6.1.0
  flame_audio: ^2.12.0
  onnxruntime_v2: ^1.23.2
  yaml: ^3.1.0

  # Shared packages
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0
  app_links: ^6.0.0

  quickapps_storage:
    path: ../../packages/quickapps_storage
  quickapps_ui:
    path: ../../packages/quickapps_ui
  quickapps_ads:
    path: ../../packages/quickapps_ads
  google_mobile_ads: ^5.3.0
  quickapps_analytics:
    path: ../../packages/quickapps_analytics
  quickapps_onboarding:
    path: ../../packages/quickapps_onboarding
  quickapps_audio:
    path: ../../packages/quickapps_audio
  quickapps_logging:
    path: ../../packages/quickapps_logging
  quickapps_game_ui:
    path: ../../packages/quickapps_game_ui
  quickapps_fx:
    path: ../../packages/quickapps_fx
  quickapps_iap:
    path: ../../packages/quickapps_iap
  quickapps_debug:
    path: ../../packages/quickapps_debug
  window_manager: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  msix: ^3.16.0

msix_config:
  display_name: Stellar Broadcast
  publisher_display_name: Faustian Bargain
  identity_name: com.quickapps.stellarbroadcast
  msix_version: 2.0.0.0
  logo_path: assets/Icon_512.png
  capabilities: internetClient

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/Icon_512.png"
  adaptive_icon_background: "#0a0e1a"
  adaptive_icon_foreground: "assets/Icon_512.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/models/planet_namer_fp16.onnx
    - assets/models/vocab.json
    - assets/events/
